services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://host.docker.internal:11434
    depends_on:
      - qdrant
    volumes:
      - ollama_models:/root/.ollama

  scheduler:
    build: .
    command: python -m app.ingest.scheduler
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - INGESTION_INTERVAL_HOURS=6
    depends_on:
      - qdrant
    volumes:
      - zenml_data:/root/.zenml

volumes:
  qdrant_data:
  zenml_data:
  ollama_models: